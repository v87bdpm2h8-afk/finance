<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Finance</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #0d0d1a; color: #e8e8f0; min-height: 100vh; }
  .app { max-width: 480px; margin: 0 auto; padding-bottom: 100px; }
  .header { padding: 52px 20px 12px; display: flex; justify-content: space-between; align-items: center; }
  .header-title { font-size: 24px; font-weight: 700; color: #e8622a; letter-spacing: -0.5px; }
  .header-sub { font-size: 12px; color: #666; margin-top: 2px; }
  .month-nav { display: flex; align-items: center; gap: 8px; }
  .month-btn { background: #1a1a2e; border: none; color: #aaa; border-radius: 8px; width: 34px; height: 34px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
  .month-label { font-size: 13px; font-weight: 600; min-width: 72px; text-align: center; }
  .nav { display: flex; flex-direction: row; gap: 6px; padding: 0 20px 16px; }
  .nav-btn { flex: 1; padding: 9px 2px; border-radius: 10px; border: none; cursor: pointer; font-size: 10px; font-weight: 600; background: #13132a; color: #666; font-family: -apple-system, sans-serif; white-space: nowrap; }
  .nav-btn.active { background: #e8622a; color: #fff; }
  .content { padding: 0 20px; }
  .card { background: #13132a; border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid #1e1e3f; }
  .balance-card { background: linear-gradient(135deg, #0d2818, #13132a); border: 1px solid #06d6a033; }
  .balance-card.negative { background: linear-gradient(135deg, #2a0d1a, #13132a); border-color: #ff4d6d33; }
  .balance-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .balance-amount { font-size: 36px; font-weight: 700; color: #06d6a0; letter-spacing: -1px; }
  .balance-amount.negative { color: #ff4d6d; }
  .balance-row { display: flex; gap: 20px; margin-top: 12px; }
  .balance-col .blabel { font-size: 11px; color: #666; }
  .balance-col .bval { font-size: 18px; font-weight: 600; }
  .balance-col .bplan { font-size: 10px; color: #444; }
  .divider-v { width: 1px; background: #1e1e3f; }
  .section-title { font-size: 13px; font-weight: 600; margin-bottom: 12px; }
  .cat-row { margin-bottom: 10px; }
  .cat-header { display: flex; justify-content: space-between; margin-bottom: 3px; }
  .cat-name { font-size: 12px; color: #ccc; }
  .cat-name.over { color: #ff4d6d; }
  .cat-amount { font-size: 12px; font-weight: 600; color: #ccc; }
  .cat-amount.over { color: #ff4d6d; }
  .cat-plan { color: #444; font-weight: 400; }
  .bar-bg { background: #1a1a2e; border-radius: 4px; height: 6px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; background: #06d6a0; }
  .bar-fill.warn { background: #ffd166; }
  .bar-fill.over { background: #ff4d6d; }
  .recent-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #1e1e3f; }
  .recent-item:last-child { border-bottom: none; }
  .tx-cat { font-size: 13px; font-weight: 500; }
  .tx-note { font-size: 11px; color: #555; }
  .tx-date { font-size: 10px; color: #444; }
  .tx-amount { font-weight: 700; }
  .tx-amount.expense { color: #ff4d6d; }
  .tx-amount.income { color: #06d6a0; }
  .tx-badge { font-size: 9px; padding: 2px 5px; border-radius: 8px; margin-left: 4px; font-weight: 600; }
  .tx-badge.cash { background: #2a2a1a; color: #ffd166; }
  .tx-badge.card { background: #1a1a2e; color: #7eb8f7; }
  .wealth-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
  .wealth-item { background: #0d0d1a; border-radius: 12px; padding: 12px; border: 1px solid #1e1e3f; }
  .wealth-item-label { font-size: 10px; color: #555; margin-bottom: 4px; }
  .wealth-item-val { font-size: 16px; font-weight: 700; }
  .wealth-total { font-size: 30px; font-weight: 700; color: #e8622a; margin: 6px 0 4px; letter-spacing: -1px; }
  .invest-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid #1e1e3f; }
  .invest-edit { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 8px; padding: 6px 10px; color: #fff; font-size: 14px; width: 110px; font-family: -apple-system, sans-serif; text-align: right; }
  .form-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: #e8622a; }
  .type-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
  .type-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; font-size: 15px; background: #1a1a2e; color: #666; font-family: -apple-system, sans-serif; }
  .type-btn.expense.active { background: #ff4d6d; color: #fff; }
  .type-btn.income.active { background: #06d6a0; color: #fff; }
  .pay-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
  .pay-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #2a2a4a; cursor: pointer; font-weight: 600; font-size: 14px; background: #1a1a2e; color: #666; font-family: -apple-system, sans-serif; }
  .pay-btn.cash.active { background: #2a2a1a; border-color: #ffd166; color: #ffd166; }
  .pay-btn.card.active { border-color: #7eb8f7; color: #7eb8f7; }
  .form-label { font-size: 12px; color: #666; display: block; margin-bottom: 6px; }
  .form-input { width: 100%; background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 10px; padding: 14px; color: #fff; font-size: 16px; margin-bottom: 14px; font-family: -apple-system, sans-serif; -webkit-appearance: none; appearance: none; }
  .form-input.big { font-size: 20px; font-weight: 600; }
  .form-input:focus { outline: none; border-color: #e8622a; }
  select.form-input { font-size: 15px; }
  .submit-btn { width: 100%; padding: 16px; border-radius: 12px; border: none; cursor: pointer; background: #e8622a; color: #fff; font-weight: 700; font-size: 17px; font-family: -apple-system, sans-serif; margin-top: 4px; }
  .tx-list-item { display: flex; justify-content: space-between; align-items: center; }
  .tx-info { flex: 1; }
  .tx-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .del-btn { background: #1a1a2e; border: none; color: #555; border-radius: 6px; padding: 6px 10px; cursor: pointer; font-size: 18px; }
  .del-confirm { display: flex; gap: 4px; }
  .del-yes { background: #ff4d6d; border: none; color: #fff; border-radius: 6px; padding: 6px 10px; cursor: pointer; font-size: 12px; font-family: -apple-system, sans-serif; }
  .del-no { background: #2a2a4a; border: none; color: #aaa; border-radius: 6px; padding: 6px 10px; cursor: pointer; font-size: 12px; font-family: -apple-system, sans-serif; }
  .fixed-row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid #1e1e3f; font-size: 14px; }
  .fixed-total { display: flex; justify-content: space-between; padding: 12px 0 0; font-weight: 700; font-size: 16px; }
  .toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 30px; z-index: 999; font-weight: 600; font-size: 14px; box-shadow: 0 4px 20px rgba(0,0,0,.5); white-space: nowrap; }
  .empty { text-align: center; color: #444; padding: 40px 20px; font-size: 15px; }
  .budget-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid #1e1e3f; }
  .budget-row:last-child { border-bottom: none; }
  .budget-name { font-size: 13px; color: #ccc; flex: 1; }
  .budget-input { background: #0d0d1a; border: 1px solid #2a2a4a; border-radius: 8px; padding: 6px 10px; color: #fff; font-size: 14px; font-weight: 600; width: 90px; text-align: right; font-family: -apple-system, sans-serif; }
  .budget-input:focus { outline: none; border-color: #e8622a; }
  .save-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; cursor: pointer; background: #06d6a0; color: #fff; font-weight: 700; font-size: 16px; font-family: -apple-system, sans-serif; margin-top: 8px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="header-title">Finance</div>
      <div class="header-sub">Osebni tracker</div>
    </div>
    <div class="month-nav">
      <button class="month-btn" onclick="changeMonth(-1)">‹</button>
      <span class="month-label" id="monthLabel"></span>
      <button class="month-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn active" id="nav-dashboard" onclick="setView('dashboard')">📊 Pregled</button>
    <button class="nav-btn" id="nav-add" onclick="setView('add')">＋ Dodaj</button>
    <button class="nav-btn" id="nav-transactions" onclick="setView('transactions')">📋 Seznam</button>
    <button class="nav-btn" id="nav-fiksni" onclick="setView('fiksni')">🔒 Fiksni</button>
    <button class="nav-btn" id="nav-budget" onclick="setView('budget')">⚙️ Budget</button>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
const STORAGE_KEY = 'finance-matevz-2026';
const MONTHS = ['Jan','Feb','Mar','Apr','Maj','Jun','Jul','Avg','Sep','Okt','Nov','Dec'];
const EXPENSE_CATEGORIES = [
  'Živila','Transport','Potrošniški material & Higiena','Zdravje & Suplementi',
  'Restavracije & Bari','Zabava & Potovanja','Darila','Nakupovanje',
  'Varčevalni račun','Investicijski račun','Fiksni stroški','Nepričakovani','Drugo'
];
const INCOME_SOURCES = ["Men's Cave", 'BarberShop Frankolovo', 'Drugo'];
const FIXED_EXPENSES = [
  { name: 'Najemnina', amount: 320 },
  { name: 'Cell Phone', amount: 5 },
  { name: 'Mami telefon', amount: 40 },
  { name: 'Revolut', amount: 9 },
  { name: 'Apple Creator', amount: 13 },
  { name: 'Claude', amount: 22 },
  { name: 'Fitnes', amount: 35 },
  { name: 'iCloud', amount: 5 },
];
const FIXED_TOTAL = FIXED_EXPENSES.reduce((s,e) => s+e.amount, 0);
const PLANNED = {
  expenses: {
    'Živila':150,'Transport':110,'Potrošniški material & Higiena':30,
    'Zdravje & Suplementi':30,'Restavracije & Bari':30,'Zabava & Potovanja':20,
    'Darila':20,'Nakupovanje':40,'Varčevalni račun':50,
    'Investicijski račun':50,'Fiksni stroški':FIXED_TOTAL,'Nepričakovani':0,'Drugo':0,
  },
  income: { "Men's Cave":200,'BarberShop Frankolovo':500,'Drugo':0 }
};
const INIT = { cash:1273.00, card:465.92, savings:1183.50, investment:1970.00 };

let state = { currentMonth:new Date().getMonth(), currentYear:new Date().getFullYear(), transactions:[], investmentValue:INIT.investment, plannedExpenses:null, plannedIncome:null, fixedExpenses:null };
let currentView = 'dashboard';
let deletingId = null;
let formType = 'expense';
let formPayment = 'card';

function getPlannedExp() { return state.plannedExpenses || PLANNED.expenses; }
function getPlannedInc() { return state.plannedIncome || PLANNED.income; }
function getFixedExp() { return state.fixedExpenses || FIXED_EXPENSES; }
function getFixedTotal() { return getFixedExp().reduce((s,e)=>s+e.amount,0); }

function saveBudget() {
  // expenses
  const newExp = {};
  EXPENSE_CATEGORIES.forEach(c => {
    const el = document.getElementById('bexp-'+c.replace(/[^a-z0-9]/gi,'_'));
    if(el) newExp[c] = parseFloat(el.value.replace(',','.')) || 0;
    else newExp[c] = getPlannedExp()[c] || 0;
  });
  // update fiksni stroški planned to match fixed total
  const newFixed = [];
  getFixedExp().forEach((e,i) => {
    const el = document.getElementById('bfix-'+i);
    const amt = el ? parseFloat(el.value.replace(',','.')) || 0 : e.amount;
    newFixed.push({ name: e.name, amount: amt });
  });
  const newFixedTotal = newFixed.reduce((s,e)=>s+e.amount,0);
  newExp['Fiksni stroški'] = newFixedTotal;
  // income
  const newInc = {};
  INCOME_SOURCES.forEach(s => {
    const el = document.getElementById('binc-'+s.replace(/[^a-z0-9]/gi,'_'));
    if(el) newInc[s] = parseFloat(el.value.replace(',','.')) || 0;
    else newInc[s] = getPlannedInc()[s] || 0;
  });
  state.plannedExpenses = newExp;
  state.plannedIncome = newInc;
  state.fixedExpenses = newFixed;
  save();
  showToast('Budget shranjen ✓');
  renderContent();
}

function load() {
  try { const r = localStorage.getItem(STORAGE_KEY); if(r) state = JSON.parse(r); } catch(e) {}
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}
function fmt(n) { return '€' + Math.abs(n).toFixed(2); }

function changeMonth(dir) {
  state.currentMonth += dir;
  if(state.currentMonth < 0) { state.currentMonth=11; state.currentYear--; }
  if(state.currentMonth > 11) { state.currentMonth=0; state.currentYear++; }
  save(); render();
}

function setView(v) {
  currentView = v; deletingId = null;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-'+v).classList.add('active');
  renderContent();
}

function getMonthTx() {
  return state.transactions.filter(t => {
    const d = new Date(t.date);
    return d.getMonth()===state.currentMonth && d.getFullYear()===state.currentYear;
  });
}

function calcWealth() {
  let cash = INIT.cash, card = INIT.card, savings = INIT.savings;
  state.transactions.forEach(t => {
    if(t.type==='income') {
      if(t.payment==='cash') cash+=t.amount; else card+=t.amount;
    } else {
      if(t.category==='Varčevalni račun') {
        savings+=t.amount;
        if(t.payment==='cash') cash-=t.amount; else card-=t.amount;
      } else {
        if(t.payment==='cash') cash-=t.amount; else card-=t.amount;
      }
    }
  });
  const investment = state.investmentValue || INIT.investment;
  return { cash, card, savings, investment, total: cash+card+savings+investment };
}

function addTransaction() {
  const amt = parseFloat(document.getElementById('f-amount').value.replace(',','.'));
  if(!amt || amt<=0) { showToast('Vnesi veljaven znesek!','#ff4d6d'); return; }
  const tx = {
    id: Date.now(),
    date: document.getElementById('f-date').value,
    type: formType,
    category: document.getElementById('f-category').value,
    amount: amt,
    note: document.getElementById('f-note').value.trim(),
    payment: formPayment
  };
  state.transactions.unshift(tx);
  save();
  showToast(formType==='expense' ? 'Strošek dodan ✓' : 'Prihodek dodan ✓');
  setView('dashboard');
}

function deleteTransaction(id) {
  state.transactions = state.transactions.filter(t => t.id!==id);
  save(); deletingId=null;
  showToast('Izbrisano','#ff4d6d');
  renderContent();
}

function confirmDelete(id) { deletingId=id; renderContent(); }
function cancelDelete() { deletingId=null; renderContent(); }
function setFormType(t) { formType=t; renderContent(); }
function setFormPayment(p) { formPayment=p; renderContent(); }

function updateInvestment() {
  const val = parseFloat(document.getElementById('invest-input').value.replace(',','.'));
  if(!isNaN(val) && val>=0) { state.investmentValue=val; save(); showToast('Posodobljeno ✓'); renderContent(); }
}

function showToast(msg, color='#06d6a0') {
  const ex = document.querySelector('.toast'); if(ex) ex.remove();
  const t = document.createElement('div');
  t.className='toast'; t.style.background=color; t.style.color='#fff'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>t.remove(),300); },2200);
}

function renderContent() {
  const monthTx = getMonthTx();
  const totalExp = monthTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const totalInc = monthTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const saved = totalInc - totalExp;
  const plannedExpTotal = Object.values(getPlannedExp()).reduce((s,v)=>s+v,0);
  const plannedIncTotal = Object.values(getPlannedInc()).reduce((s,v)=>s+v,0);
  const wealth = calcWealth();
  const expByCat = {};
  EXPENSE_CATEGORIES.forEach(c=>expByCat[c]=0);
  monthTx.filter(t=>t.type==='expense').forEach(t=>{expByCat[t.category]=(expByCat[t.category]||0)+t.amount;});
  const incBySrc = {};
  INCOME_SOURCES.forEach(s=>incBySrc[s]=0);
  monthTx.filter(t=>t.type==='income').forEach(t=>{incBySrc[t.category]=(incBySrc[t.category]||0)+t.amount;});
  const el = document.getElementById('content');

  if(currentView==='dashboard') {
    const sign = saved>=0?'+':'-';
    let catsHtml = EXPENSE_CATEGORIES.filter(c=>(getPlannedExp()[c]||0)>0||expByCat[c]>0).map(c=>{
      const actual=expByCat[c]||0, planned=getPlannedExp()[c]||0;
      const pct=planned>0?Math.min((actual/planned)*100,100):actual>0?100:0;
      const over=actual>planned&&planned>0;
      return `<div class="cat-row"><div class="cat-header"><span class="cat-name ${over?'over':''}">${c}</span><span class="cat-amount ${over?'over':''}">${fmt(actual)} <span class="cat-plan">/ ${fmt(planned)}</span></span></div><div class="bar-bg"><div class="bar-fill ${over?'over':pct>80?'warn':''}" style="width:${pct}%"></div></div></div>`;
    }).join('');
    let incsHtml = INCOME_SOURCES.map(s=>{
      const actual=incBySrc[s]||0, planned=getPlannedInc()[s]||0;
      const pct=planned>0?Math.min((actual/planned)*100,100):0;
      return `<div class="cat-row"><div class="cat-header"><span class="cat-name">${s}</span><span class="cat-amount">${fmt(actual)} <span class="cat-plan">/ ${fmt(planned)}</span></span></div><div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div></div>`;
    }).join('');
    let recentHtml = monthTx.length>0 ? `<div class="card"><div class="section-title" style="color:#888">Zadnje transakcije</div>${monthTx.slice(0,5).map(t=>`<div class="recent-item"><div><div class="tx-cat">${t.category} <span class="tx-badge ${t.payment||'card'}">${t.payment==='cash'?'💵':'💳'}</span></div>${t.note?`<div class="tx-note">${t.note}</div>`:''}<div class="tx-date">${t.date}</div></div><div class="tx-amount ${t.type}">${t.type==='expense'?'-':'+'}${fmt(t.amount)}</div></div>`).join('')}</div>` : '';

    el.innerHTML = `
      <div class="card" style="border-color:#e8622a33">
        <div class="balance-label">Skupno premoženje</div>
        <div class="wealth-total">${fmt(wealth.total)}</div>
        <div class="wealth-grid">
          <div class="wealth-item"><div class="wealth-item-label">💵 Gotovina</div><div class="wealth-item-val" style="color:#ffd166">${fmt(wealth.cash)}</div></div>
          <div class="wealth-item"><div class="wealth-item-label">💳 Kartica</div><div class="wealth-item-val" style="color:#7eb8f7">${fmt(wealth.card)}</div></div>
          <div class="wealth-item"><div class="wealth-item-label">🏦 Varčevalni</div><div class="wealth-item-val" style="color:#06d6a0">${fmt(wealth.savings)}</div></div>
          <div class="wealth-item"><div class="wealth-item-label">📈 Investicijski</div><div class="wealth-item-val" style="color:#c084fc">${fmt(wealth.investment)}</div></div>
        </div>
        <div class="invest-row">
          <span style="font-size:12px;color:#666">Posodobi investicijski:</span>
          <input id="invest-input" type="text" inputmode="decimal" value="${(state.investmentValue||INIT.investment).toFixed(2)}" class="invest-edit" onblur="updateInvestment()">
        </div>
      </div>
      <div class="card balance-card ${saved<0?'negative':''}">
        <div class="balance-label">Ta mesec — ${MONTHS[state.currentMonth]} ${state.currentYear}</div>
        <div class="balance-amount ${saved<0?'negative':''}">${sign}${fmt(saved)}</div>
        <div class="balance-row">
          <div class="balance-col"><div class="blabel">Prihodki</div><div class="bval" style="color:#06d6a0">${fmt(totalInc)}</div><div class="bplan">načrt ${fmt(plannedIncTotal)}</div></div>
          <div class="divider-v"></div>
          <div class="balance-col"><div class="blabel">Stroški</div><div class="bval" style="color:#ff4d6d">${fmt(totalExp)}</div><div class="bplan">načrt ${fmt(plannedExpTotal)}</div></div>
        </div>
      </div>
      <div class="card"><div class="section-title" style="color:#e8622a">Stroški po kategorijah</div>${catsHtml}</div>
      <div class="card"><div class="section-title" style="color:#06d6a0">Prihodki po virih</div>${incsHtml}</div>
      ${recentHtml}`;
  }

  else if(currentView==='add') {
    const today = new Date().toISOString().slice(0,10);
    const cats = formType==='expense' ? EXPENSE_CATEGORIES : INCOME_SOURCES;
    el.innerHTML = `
      <div class="card">
        <div class="form-title">Nova transakcija</div>
        <div class="type-toggle">
          <button class="type-btn expense ${formType==='expense'?'active':''}" onclick="setFormType('expense')">Strošek</button>
          <button class="type-btn income ${formType==='income'?'active':''}" onclick="setFormType('income')">Prihodek</button>
        </div>
        <label class="form-label">Znesek (€)</label>
        <input id="f-amount" type="text" placeholder="0.00" class="form-input big" inputmode="decimal">
        <label class="form-label">Kategorija</label>
        <select id="f-category" class="form-input">${cats.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
        <label class="form-label">Način plačila</label>
        <div class="pay-toggle">
          <button class="pay-btn cash ${formPayment==='cash'?'active':''}" onclick="setFormPayment('cash')">💵 Gotovina</button>
          <button class="pay-btn card ${formPayment==='card'?'active':''}" onclick="setFormPayment('card')">💳 Kartica</button>
        </div>
        <label class="form-label">Datum</label>
        <input id="f-date" type="date" value="${today}" class="form-input">
        <label class="form-label">Opomba (neobvezno)</label>
        <input id="f-note" type="text" placeholder="npr. Mercator, Shell..." class="form-input">
        <button class="submit-btn" onclick="addTransaction()">Dodaj transakcijo</button>
      </div>`;
  }

  else if(currentView==='transactions') {
    if(monthTx.length===0) { el.innerHTML=`<div class="card"><div class="empty">Ni transakcij za ta mesec.</div></div>`; return; }
    el.innerHTML = `<div style="font-size:13px;color:#555;margin-bottom:10px">${monthTx.length} transakcij — ${MONTHS[state.currentMonth]} ${state.currentYear}</div>`
      + monthTx.map(t=>{
        const actions = deletingId===t.id
          ? `<div class="del-confirm"><button class="del-yes" onclick="deleteTransaction(${t.id})">Izbriši</button><button class="del-no" onclick="cancelDelete()">Ne</button></div>`
          : `<button class="del-btn" onclick="confirmDelete(${t.id})">×</button>`;
        return `<div class="card tx-list-item"><div class="tx-info"><div class="tx-cat">${t.category} <span class="tx-badge ${t.payment||'card'}">${t.payment==='cash'?'💵':'💳'}</span></div>${t.note?`<div class="tx-note">${t.note}</div>`:''}<div class="tx-date">${t.date}</div></div><div class="tx-actions"><div class="tx-amount ${t.type}">${t.type==='expense'?'-':'+'}${fmt(t.amount)}</div>${actions}</div></div>`;
      }).join('');
  }

  else if(currentView==='budget') {
    const pe = getPlannedExp();
    const pi = getPlannedInc();
    const fe = getFixedExp();
    const expInputs = EXPENSE_CATEGORIES.filter(c=>c!=='Fiksni stroški').map(c=>{
      const id='bexp-'+c.replace(/[^a-z0-9]/gi,'_');
      return `<div class="budget-row"><span class="budget-name">${c}</span><input id="${id}" type="text" inputmode="decimal" value="${(pe[c]||0).toFixed(0)}" class="budget-input"></div>`;
    }).join('');
    const fixInputs = fe.map((e,i)=>`<div class="budget-row"><span class="budget-name">${e.name}</span><input id="bfix-${i}" type="text" inputmode="decimal" value="${e.amount.toFixed(0)}" class="budget-input"></div>`).join('');
    const incInputs = INCOME_SOURCES.map(s=>{
      const id='binc-'+s.replace(/[^a-z0-9]/gi,'_');
      return `<div class="budget-row"><span class="budget-name">${s}</span><input id="${id}" type="text" inputmode="decimal" value="${(pi[s]||0).toFixed(0)}" class="budget-input"></div>`;
    }).join('');
    el.innerHTML = `
      <div class="card">
        <div class="section-title" style="color:#e8622a">Načrtovani stroški</div>
        ${expInputs}
      </div>
      <div class="card" style="border-color:#e8622a33">
        <div class="section-title" style="color:#e8622a">🔒 Fiksni stroški</div>
        ${fixInputs}
      </div>
      <div class="card">
        <div class="section-title" style="color:#06d6a0">Načrtovani prihodki</div>
        ${incInputs}
      </div>
      <button class="save-btn" onclick="saveBudget()">💾 Shrani spremembe</button>`;
  }

  else if(currentView==='fiksni') {
    el.innerHTML = `
      <div class="card" style="border-color:#e8622a33">
        <div class="section-title" style="color:#e8622a">🔒 Fiksni mesečni stroški</div>
        ${getFixedExp().map(e=>`<div class="fixed-row"><span>${e.name}</span><span style="font-weight:600;color:#ccc">${fmt(e.amount)}</span></div>`).join('')}
        <div class="fixed-total"><span>SKUPAJ</span><span style="color:#e8622a">${fmt(getFixedTotal())}</span></div>
      </div>`;
  }
}

function render() {
  document.getElementById('monthLabel').textContent = MONTHS[state.currentMonth]+' '+state.currentYear;
  renderContent();
}

load();
render();
</script>
</body>
</html>
